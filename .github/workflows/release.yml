name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  ci:
    name: CI Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Build
        run: cargo build --workspace
      - name: Test
        run: cargo test --workspace
      - name: Doc
        run: cargo doc --workspace --no-deps

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Create crates.io wait helper
        run: |
          cat <<'EOF' >/tmp/wait-for-crates-io.sh
          #!/usr/bin/env bash
          set -euo pipefail

          crate="$1"
          version="$2"
          delay=2
          max_delay=60

          for attempt in {1..10}; do
            if cargo info --registry crates-io "${crate}@${version}" >/dev/null 2>&1; then
              exit 0
            fi

            if [ "$attempt" -eq 10 ]; then
              echo "::error::Timed out waiting for ${crate}@${version} to appear on crates.io"
              exit 1
            fi

            sleep "$delay"
            if [ "$delay" -lt "$max_delay" ]; then
              delay=$((delay * 2))
              if [ "$delay" -gt "$max_delay" ]; then
                delay="$max_delay"
              fi
            fi
          done
          EOF
          chmod +x /tmp/wait-for-crates-io.sh
      - name: Publish langfuse-core
        run: cargo publish -p langfuse-core --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Wait for langfuse-core on crates.io
        run: /tmp/wait-for-crates-io.sh langfuse-core "${GITHUB_REF_NAME#v}"
      - name: Publish langfuse-macros
        run: cargo publish -p langfuse-macros --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Wait for langfuse-macros on crates.io
        run: /tmp/wait-for-crates-io.sh langfuse-macros "${GITHUB_REF_NAME#v}"
      - name: Publish langfuse-sdk
        # The main crate publishes as `langfuse-sdk` because `langfuse-rs`
        # is already taken on crates.io; the library import path remains
        # `langfuse` via `[lib] name = "langfuse"`.
        run: cargo publish -p langfuse-sdk --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Wait for langfuse-sdk on crates.io
        run: /tmp/wait-for-crates-io.sh langfuse-sdk "${GITHUB_REF_NAME#v}"
      - name: Publish langfuse-openai
        run: cargo publish -p langfuse-openai --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        with:
          generate_release_notes: true
